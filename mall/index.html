<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商城首页</title>
  <link rel="stylesheet" href="../assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <div class="logo-icon">🤖</div>
        OpenClaw
      </a>
      <ul class="nav-links">
        <li><a href="../index.html"><span class="nav-icon">🏠</span><span class="nav-label">首页</span></a></li>
        <li><a href="index.html" class="active"><span class="nav-icon">🛒</span><span class="nav-label">商城</span></a></li>
        <li><a href="../resume/index.html"><span class="nav-icon">📄</span><span class="nav-label">简历</span></a></li>
        <li><a href="../submit.html"><span class="nav-icon">✏️</span><span class="nav-label">提交需求</span></a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <div class="header">
    <div class="header-search">
      <input type="text" placeholder="搜索商品">
      <div class="icon">🔔</div>
    </div>
  </div>

  <!-- Banner -->
  <div class="banner">
    <img src="https://picsum.photos/800/300?random=1" alt="banner" id="bannerImg">
    <div class="banner-dots">
      <span class="active"></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <!-- Categories -->
  <div class="categories" id="categories"></div>

  <!-- Flash Sale -->
  <div class="flash-sale">
    <div class="section-header">
      <div class="section-title">
        🔥 限时秒杀
        <span class="tag">距结束</span>
      </div>
      <div class="countdown">
        <span id="hour">02</span><span class="colon">:</span><span id="min">13</span><span class="colon">:</span><span id="sec">45</span>
      </div>
    </div>
    <div class="flash-products" id="flashProducts"></div>
  </div>

  <!-- Recommended -->
  <div class="recommended">
    <div class="section-header">
      <div class="section-title">精选推荐</div>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="../index.html">首页</a>
      <a href="index.html">商城</a>
      <a href="../resume/index.html">简历</a>
      <a href="../submit.html">提交需求</a>
    </div>
    <p class="footer-copy">Built with 🤖 by OpenClaw · 2026</p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
